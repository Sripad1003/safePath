<!DOCTYPE html>
<html>
<head>
  <title>Safe Path Recommender</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.10/semantic.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      padding-top: 70px;
      background: url(http://holeinthedonut.smugmug.com/DailyPhotos/HITD-Daily-Photos/i-Wmw432C/0/O/Illinois-Chicago-downtown-street-scene.jpg);
      background-size: cover;
      background-position: center;
    }
    #map { height: 70vh; width: 100%; }
    .controls {
      margin: 10px;
      padding: 6px;
      width: 240px;
    }
  </style>
</head>

<body>

<div class="ui container">
  <h1 style="color:white;font-family:georgia">Safe Path Recommender</h1>
  <h3 style="color:white">Because you must look before you leave!</h3>
</div>

<input id="origin-input" class="controls" placeholder="Origin">
<input id="destination-input" class="controls" placeholder="Destination">

<div id="mode-selector" class="controls">
  <input type="radio" name="type" id="walking" checked> Walking
  <input type="radio" name="type" id="driving"> Driving
  <input type="radio" name="type" id="transit"> Transit
</div>

<div id="map"></div>

<!-- GOOGLE MAPS SCRIPT (CORRECT WAY) -->
<script
  src="/maps-loader.js"
  async defer
></script>

<script>
let map, directionsService, directionsRenderer;

function initMap() {
  const hyd = { lat: 17.385044, lng: 78.486671 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: hyd,
    zoom: 12
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    map: map
  });

  new google.maps.Marker({
    position: hyd,
    map: map,
    title: "Delhi"
  });

  setupAutocomplete(); // ✅ REQUIRED
}
</script>



<script>
/* ------------------ DUMMY HYDERABAD DATA ------------------ */
const crimeData = [
  { lat: 17.4478, lng: 78.3762, mag: 10 }, // Madhapur
  { lat: 17.4435, lng: 78.4094, mag: 100 }, // Kukatpally
  { lat: 17.4210, lng: 78.4488, mag: 1000 }, // Banjara Hills
  { lat: 17.4365, lng: 78.4983, mag: 400 }, // Secunderabad
  { lat: 17.4325, lng: 78.3841, mag: 20000 }  // Gachibowli
];

let originPlace = null;
let destinationPlace = null;

function setupAutocomplete() {
  const originInput = document.getElementById("origin-input");
const destinationInput = document.getElementById("destination-input");

  const originAutocomplete = new google.maps.places.Autocomplete(originInput);
  const destinationAutocomplete = new google.maps.places.Autocomplete(destinationInput);

  originAutocomplete.addListener("place_changed", () => {
    originPlace = originAutocomplete.getPlace();
    route(originPlace, destinationPlace);
  });

  destinationAutocomplete.addListener("place_changed", () => {
    destinationPlace = destinationAutocomplete.getPlace();
    route(originPlace, destinationPlace);
  });
}

function getTravelMode() {
  if (document.getElementById("walking").checked)
    return google.maps.TravelMode.WALKING;
  if (document.getElementById("transit").checked)
    return google.maps.TravelMode.TRANSIT;
  return google.maps.TravelMode.DRIVING;
}

function route(originPlace, destinationPlace) {
  if (!originPlace || !destinationPlace) return;

  directionsService.route(
    {
      origin: { placeId: originPlace.place_id },
      destination: { placeId: destinationPlace.place_id },
      travelMode: getTravelMode(), // ✅ NOW WORKS
    },
    (result, status) => {
      if (status === "OK") {
        directionsRenderer.setDirections(result);
      } else {
        console.error("Directions failed:", status);
      }
    }
  );
}


</script>

</body>
</html>
